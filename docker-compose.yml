# ─────────────────────────────────────────────────────────────
#  uniAI – single root compose file
#  Run:  docker compose up --build
#  Certs: run ./nginx/certs/generate.sh once before first boot
# ─────────────────────────────────────────────────────────────

services:

  # ── PostgreSQL 17 ─────────────────────────────────────────
  postgres:
    image: postgres:17-alpine
    container_name: uniai_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-uniai}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-uniai}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./Server/db:/docker-entrypoint-initdb.d:ro   # runs init.sql on first boot
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-uniai}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - uniai_network

  # ── Spring Boot backend ────────────────────────────────────
  app:
    build:
      context: ./Server
      dockerfile: server/Dockerfile
    container_name: uniai_app
    env_file:
      - .env
    volumes:
      - ./Server:/workspace:cached
      - ~/.m2:/root/.m2:rw
    environment:
      SPRING_PROFILES_ACTIVE: dev
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      APP_BASE_URL: ${APP_BASE_URL:-https://localhost}
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-uniai}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-uniai}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-password}
    depends_on:
      postgres:
        condition: service_healthy
    stdin_open: true
    tty: true
    networks:
      - uniai_network

  # ── React/Vite – production build ─────────────────────────
  client-build:
    build:
      context: ./Client
      dockerfile: Dockerfile
      target: builder       # runs npm ci + npm run build; dist → client_dist volume
    container_name: uniai_client_builder
    volumes:
      - client_dist:/app/dist    # nginx reads from this shared volume
    networks:
      - uniai_network

  # ── React/Vite – hot-reload dev server ────────────────────
  client-dev:
    build:
      context: ./Client
      dockerfile: Dockerfile.dev
    container_name: uniai_client_dev
    volumes:
      - ./Client:/app:cached
      - client_node_modules:/app/node_modules
    environment:
      NODE_ENV: development
      CHOKIDAR_USEPOLLING: "true"
      # Empty = same-origin: browser calls /api/... which nginx routes to the backend.
      # Override with http://localhost:9090 for dev outside Docker.
      VITE_API_URL: ""
      # Vite proxy target: used when accessing Vite directly (bypassing nginx).
      VITE_BACKEND_TARGET: "http://app:9090"
    healthcheck:
      # Use 127.0.0.1 not localhost: inside alpine containers localhost resolves
      # to ::1 (IPv6) but Vite only binds on IPv4 0.0.0.0:5173.
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:5173 || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 15s
    stdin_open: true
    tty: true
    networks:
      - uniai_network

  # ── Nginx – TLS termination + reverse proxy ───────────────
  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: uniai_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/certs:/etc/nginx/certs:ro   # populated by generate.sh
      - client_dist:/usr/share/nginx/html:ro
    depends_on:
      - app
      - client-build
    networks:
      - uniai_network

volumes:
  postgres_data:
  client_dist:
  client_node_modules:
    name: uniai_client_node_modules

networks:
  uniai_network:
    driver: bridge
