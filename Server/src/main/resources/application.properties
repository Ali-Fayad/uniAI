spring.application.name=uniai
server.port=9090

# AI
ai.provider=${AI_PROVIDER:placeholder}

ai.gemini.base-url=${GEMINI_BASE_URL:https://generativelanguage.googleapis.com/v1beta}
ai.gemini.model=${GEMINI_MODEL:gemini-2.5-flash}
ai.gemini.api-key=${GEMINI_API_KEY:}

ai.groq.base-url=${GROQ_BASE_URL:https://api.groq.com/openai/v1}
ai.groq.model=${GROQ_MODEL:llama-3.3-70b-versatile}
ai.groq.api-key=${GROQ_API_KEY:}

# JWT
jwt.secret=${JWT_SECRET}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# Email
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.ssl.protocols=TLSv1.2
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# Google OAuth2
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.redirect-uri=${GOOGLE_REDIRECT_URI:http://localhost:9090/api/auth/google/callback}
spring.security.oauth2.client.registration.google.scope=profile,email

# Email settings
app.email.from=${MAIL_FROM:noreply@uniai.com}
app.email.code-expiry-minutes=${EMAIL_CODE_EXPIRY_MINUTES:15}
app.email.code-length=${EMAIL_CODE_LENGTH:6}
app.email.support-url=${EMAIL_SUPPORT_URL:mailto:support@uniai.com}
app.email.base-url=${APP_BASE_URL:http://localhost:9090}

# Logging
logging.level.root=${LOGGING_LEVEL_ROOT:INFO}
logging.level.com.uniai=${LOGGING_LEVEL_COM_UNIAI:DEBUG}
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0

# CORS
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS}

# Actuator
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never